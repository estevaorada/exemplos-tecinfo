<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de IMC</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f9b0f, #56ab2f);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
    }

    .main-container {
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      padding: 40px;
    }

    h1 {
      font-weight: 700;
      text-align: center;
      margin-bottom: 40px;
      color: #198754;
    }

    .card-custom {
      border: none;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      padding: 25px;
      height: 100%;
    }

    .resultado-valor {
      font-size: 2rem;
      font-weight: 700;
      color: #198754;
    }

    .btn-success {
      background: linear-gradient(90deg, #198754, #20c997);
      border: none;
      font-weight: 600;
    }

    .btn-success:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="main-container">
    <h1>Calculadora de IMC</h1>

    <div class="row g-4">

      <!-- Coluna 1 - Entrada -->
      <div class="col-md-6">
        <div class="card card-custom">
          <div class="mb-3">
            <label class="form-label">Peso (kg)</label>
            <input type="number" id="peso" class="form-control" placeholder="Ex: 70">
          </div>

          <div class="mb-4">
            <label class="form-label">Altura (m)</label>
            <input type="number" step="0.01" id="altura" class="form-control" placeholder="Ex: 1.75">
          </div>

          <button class="btn btn-success w-100">
            Calcular
          </button>
        </div>
      </div>

      <!-- Coluna 2 - Resultado -->
      <div class="col-md-6">
        <div class="card card-custom d-flex justify-content-center">
          <div id="resultado" class="text-center text-muted">
            Informe seus dados para calcular o IMC.
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// Insira o código JavaScript aqui:
</script>

</body>
</html>
