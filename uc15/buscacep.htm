<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buscador de CEP</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
        background: linear-gradient(135deg,#4facfe,#00f2fe);
        min-height:100vh;
        display:flex;
        align-items:center;
        }
        
        .card{
        border:none;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }
        
        h1{
        text-align:center;
        margin-bottom:35px;
        font-weight:600;
        }
        
        .label{
        font-weight:500;
        color:#555;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Buscador de CEP</h1>

        <div class="row g-4">

            <!-- COLUNA BUSCA -->
            <div class="col-md-6">

                <div class="card p-4">

                    <label class="form-label">Digite o CEP</label>

                    <input type="text" id="cep" class="form-control mb-3" placeholder="Ex: 01001000" maxlength="8">

                    <button class="btn btn-primary w-100">
                        Buscar
                    </button>

                </div>

            </div>


            <!-- COLUNA RESULTADO -->
            <div class="col-md-6">

                <div class="card p-4">

                    <h5 class="mb-3">Resultado</h5>

                    <div id="resultado" class="text-muted">

                        Digite um CEP e clique em buscar.

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
    // Insira o código aqui:
      
    </script>

</body>

</html>
